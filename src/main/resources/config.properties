# ============================================
# Browser Configuration
# ============================================
browser=chrome
baseURL=https://www.coursera.org

# ============================================
# Chrome Options
# ============================================
chrome.start.maximized=true
chrome.disable.notifications=true
chrome.remote.allow.origins=true

# ============================================
# Timeouts (in seconds)
# ============================================
explicit.wait.timeout=20
implicit.wait.timeout=10

# ============================================
# Enterprise Form Data - Test User
# ============================================
firstName=TestUser
lastName=TestLast
invalidEmail=invalid-email-format

# ============================================
# Web Development Course Filters
# ============================================
course.difficulty=Beginner
course.language=English
course.search.keyword=web development
course.limit=2

# ============================================
# Language Learning Filters
# ============================================
language.search.keyword=Language Learning
language.limit=5

# ============================================
# Application URLs
# ============================================
coursera.main.url=https://www.coursera.org
coursera.enterprise.url=https://www.coursera.org
